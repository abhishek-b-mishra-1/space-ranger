name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pygame "pygbag==0.9.2"

      - name: Build web version with Pygbag
        run: pygbag --build main_web.py

      - name: Patch built index.html and pythons.js
        run: |
          # Patch index.html
          sed -i 's/data-os=vtx,fs,snd,gui/data-os=vtx,fs,gui/' build/web/index.html
          sed -i 's/ume_block : 1/ume_block : 0/' build/web/index.html
          sed -i 's/autorun : 0/autorun : 1/' build/web/index.html
          # Fix broken prefetch: pythonrc.py is 404 on CDN, cpythonrc.py is 200
          sed -i 's|archives/0.9/pythonrc\.py|archives/0.9/cpythonrc.py|g' build/web/index.html
          # Download pythons.js, patch it to always fetch cpythonrc.py, serve locally
          curl -s "https://pygame-web.github.io/archives/0.9/pythons.js" > build/web/pythons.js
          sed -i 's/VM\.script\.interpreter + "rc\.py"/"cpythonrc.py"/g' build/web/pythons.js
          # Point index.html at our patched local pythons.js
          sed -i 's|src="https://pygame-web.github.io/archives/0.9/pythons.js"|src="pythons.js"|' build/web/index.html

      - name: Add COOP/COEP headers for Netlify
        run: |
          printf '/*\n  Cross-Origin-Opener-Policy: same-origin\n  Cross-Origin-Embedder-Policy: credentialless\n  Cross-Origin-Resource-Policy: cross-origin\n' > build/web/_headers

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
