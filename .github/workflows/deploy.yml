name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pygame "pygbag==0.8.6"

      - name: Build web version with Pygbag
        run: pygbag --build main_web.py

      - name: Patch built index.html and pythons.js
        run: |
          # Strip audio from index.html
          sed -i 's/data-os="vtx,fs,snd,gui"/data-os="vtx,fs,gui"/' build/web/index.html
          # Download pythons.js from CDN and fix const-vs-let bug (line 2438: const code reassigned)
          curl -s "https://pygame-web.github.io/archives/0.8/pythons.js" > build/web/pythons.js
          sed -i 's/                const code = script\.text/                let code = script.text/' build/web/pythons.js
          # Fix dynamic imports to use absolute CDN URLs (relative paths break when served locally)
          sed -i 's|import("\./vtx\.js")|import("https://pygame-web.github.io/archives/0.8/vtx.js")|g' build/web/pythons.js
          sed -i 's|import("\./vt\.js")|import("https://pygame-web.github.io/archives/0.8/vt.js")|g' build/web/pythons.js
          # Point index.html at our patched pythons.js
          sed -i 's|src="https://pygame-web.github.io/archives/0.8/pythons\.js"|src="pythons.js"|' build/web/index.html

      - name: Add COOP/COEP headers for Netlify
        run: |
          printf '/*\n  Cross-Origin-Opener-Policy: same-origin\n  Cross-Origin-Embedder-Policy: credentialless\n  Cross-Origin-Resource-Policy: cross-origin\n' > build/web/_headers

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
