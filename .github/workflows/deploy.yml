name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pygame "pygbag==0.9.2"

      - name: Build web version with Pygbag
        run: pygbag --build main_web.py

      - name: Patch built index.html
        run: |
          sed -i 's/data-os=vtx,fs,snd,gui/data-os=vtx,fs,gui/' build/web/index.html
          sed -i 's/ume_block : 1/ume_block : 0/' build/web/index.html
          sed -i 's/autorun : 0/autorun : 1/' build/web/index.html

      - name: Add COOP/COEP headers for Netlify
        run: |
          printf '/*\n  Cross-Origin-Opener-Policy: same-origin\n  Cross-Origin-Embedder-Policy: credentialless\n  Cross-Origin-Resource-Policy: cross-origin\n' > build/web/_headers

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
